<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HTML 5 Boilerplate</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <h1>Odin Project Calculator</h1>
    <div id="calculatorContainer">
      <div id="display"></div>
      <div id="rowOne" class="row">
        <button id="sevenButton" class="calculatorButtons">7</button>
        <button id="eightButton" class="calculatorButtons">8</button>
        <button id="nineButton" class="calculatorButtons">9</button>
        <button id="multiplyButton" class="calculatorButtons">X</button>
     </div>
      <div id="rowTwo" class="row">
        <button id="fourButton" class="calculatorButtons">4</button>
        <button id="fiveButton" class="calculatorButtons">5</button>
        <button id="sixButton" class="calculatorButtons">6</button>
        <button id="divideButton" class="calculatorButtons">/</button>
      </div>
      <div id="rowThree" class="row">
        <button id="oneButton" class="calculatorButtons">1</button>
        <button id="twoButton" class="calculatorButtons">2</button>
        <button id="threeButton" class="calculatorButtons">3</button>
        <button id="subtractButton" class="calculatorButtons">-</button>
      </div>
      <div id="rowFour" class="row">
        <button id="zeroButton" class="calculatorButtons">0</button>
        <button id="decimalButton" class="calculatorButtons">.</button>
        <button id="equalsButton" class="calculatorButtons">=</button>
        <button id="addButton" class="calculatorButtons">+</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
